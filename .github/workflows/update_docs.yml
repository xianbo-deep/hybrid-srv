name: Update Go Doc
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
    workflow_dispatch:

env:
  DEPLOY_DIR: "/www/wwwroot/fuse.xbzhong.cn"
  DOC_PORT: 6060


jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: checkout repo with ssh
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.24.0'

      - name: Sync project
        run: |
          rsync -av --delete ./ $DEPLOY_DIR
